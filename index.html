document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px; color:var(--ink,#1C1C1E)\">Keep afloat through every tide.<\u002Fh1>\n              <p style=\"font-size:19px; line-height:1.58; color:var(--muted,rgba(60,60,67,0.62)); margin:0 0 34px; max-width:540px\">Income has its high tides and its low ones. Afloat helps you set aside what you need, so you stay stable no matter what. A financial planning tool for freelancers, contractors, and creators. Anyone whose paycheck isn't steady.<\u002Fp>\n\n              <sc-if value=\"{{ fd.pending }}\" hint-placeholder-val=\"{{ true }}\">\n                <form sc-camel-on-submit=\"{{ submitD }}\" style=\"display:flex; flex-direction:column; gap:12px; max-width:470px\">\n                  <div style=\"display:flex; gap:12px\">\n                    <input value=\"{{ fd.name }}\" sc-camel-on-change=\"{{ onNameD }}\" type=\"text\" placeholder=\"First name\" style=\"flex:1; background:var(--field,#fff); border:1px solid var(--line,rgba(60,60,80,0.14)); border-radius:14px; padding:15px 16px; font-size:16px; color:var(--ink,#1C1C1E); outline:none; font-family:inherit\" style-focus=\"border-color:#007AFF; box-shadow:0 0 0 4px rgba(0,122,255,0.12)\">\n                    <input value=\"{{ fd.email }}\" sc-camel-on-change=\"{{ onEmailD }}\" type=\"email\" placeholder=\"you@email.com\" style=\"flex:1.3; background:var(--field,#fff); border:1px solid var(--line,rgba(60,60,80,0.14)); border-radius:14px; padding:15px 16px; font-size:16px; color:var(--ink,#1C1C1E); outline:none; font-family:inherit\" style-focus=\"border-color:#007AFF; box-shadow:0 0 0 4px rgba(0,122,255,0.12)\">\n                  <\u002Fdiv>\n                  <button type=\"submit\" style=\"background:linear-gradient(180deg,#0A84FF,#0060DF); color:#fff; border:none; border-radius:14px; padding:17px; font-weight:800; font-size:16px; cursor:pointer; font-family:inherit; box-shadow:0 14px 32px rgba(0,98,222,0.38)\" style-hover=\"filter:brightness(1.08)\" style-active=\"transform:scale(0.985)\">Join the waitlist<\u002Fbutton>\n                  <sc-if value=\"{{ fd.err }}\"><span style=\"font-size:13px; color:#FF3B30; font-weight:500\">{{ fd.err }}<\u002Fspan><\u002Fsc-if>\n                  <span style=\"font-size:13px; color:var(--faint,rgba(60,60,67,0.42))\">Be first in line for early access when we launch. No spam, no accounts, ever.<\u002Fspan>\n                <\u002Fform>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ fd.done }}\">\n                <div style=\"display:flex; align-items:center; gap:16px; background:var(--card,rgba(255,255,255,0.7)); border:1px solid var(--line,rgba(60,60,80,0.1)); border-radius:18px; padding:22px 24px; backdrop-filter:blur(20px); max-width:470px\">\n                  <div style=\"flex-shrink:0; width:44px; height:44px; border-radius:50%; background:#34C759; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(52,199,89,0.35)\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div><div style=\"font-size:17px; font-weight:700; color:var(--ink,#1C1C1E)\">{{ fd.doneMsg }}<\u002Fdiv><div style=\"font-size:14px; color:var(--muted,rgba(60,60,67,0.62)); margin-top:2px\">We'll email you the moment Afloat opens.<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- hero visual: phone in soft frosted panel + floating stat card -->\n            <div style=\"position:relative\">\n              <div data-float=\"1\" style=\"position:relative; display:flex; justify-content:center; animation:afFloat 8s ease-in-out infinite\">\n                <div style=\"position:relative; width:336px; height:600px; margin:0 auto; border-radius:52px 52px 0 0; background:#0b0b0d; padding:12px 12px 0; box-shadow:0 34px 70px -12px rgba(20,24,45,0.42); -webkit-mask-image:li  align-items:center; gap:9px; font-size:15px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:{{ gaugeStatusColor }}; transition:color 0.45s ease\"><span style=\"width:11px; height:11px; border-radius:50%; background:{{ gaugeStatusDot }}; box-shadow:0 0 0 4px {{ gaugeStatusRing }}; transition:background 0.45s ease, box-shadow 0.45s ease\"><\u002Fspan>{{ gaugeStatusLabel }}<\u002Fspan>\n                    <span style=\"font-size:17px; font-weight:600; letter-spacing:-0.2px; color:var(--faint,rgba(60,60,67,0.42))\">Afloat<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"position:relative; z-index:1; width:100%; height:380px\">\n                    <div style=\"position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; --fill:{{ gaugeFillD }}; --num:{{ gaugeNumColorD }}; --track:{{ gaugeTrackD }}; --doff:{{ gaugeDoffD }}; --tiprot:{{ gaugeTiprotD }}\">\n                      <svg sc-camel-view-box=\"0 0 280 250\" style=\"width:100%; height:auto; display:block; overflow:visible\">\n                        <defs>\n                          <filter id=\"afg-soft\" x=\"-30%\" y=\"-30%\" width=\"160%\" height=\"160%\"><feGaussianBlur sc-camel-std-deviation=\"6\"><\u002FfeGaussianBlur><\u002Ffilter>\n                          <filter id=\"afg-tip\" x=\"-80%\" y=\"-80%\" width=\"260%\" height=\"260%\"><feGaussianBlur sc-camel-std-deviation=\"4\"><\u002FfeGaussianBlur><\u002Ffilter>\n                        <\u002Fdefs>\n                        <path d=\"M 66.46 213.54 A 104 104 0 1 1 213.54 213.54\" fill=\"none\" stroke=\"var(--track, rgba(60,60,80,0.10))\" stroke-width=\"20\" stroke-linecap=\"round\"><\u002Fpath>\n                        <path d=\"M 66.46 213.54 A 104 104 0 1 1 213.54 213.54\" sc-camel-path-length=\"1000\" fill=\"none\" stroke=\"var(--fill, #34C759)\" stroke-width=\"20\" stroke-linecap=\"round\" stroke-dasharray=\"1000\" style=\"stroke-dashoffset:var(--doff, 1000); transition:stroke-dashoffset 0.95s cubic-bezier(0.22,0.61,0.36,1), stroke 0.55s; opacity:0.35; filter:url(#afg-soft)\"><\u002Fpath>\n                        <path d=\"M 66.46 213.54 A 104 104 0 1 1 213.54 213.54\" sc-camel-path-length=\"1000\" fill=\"none\" stroke=\"var(--fill, #34C759)\" stroke-width=\"20\" stroke-linecap=\"round\" stroke-dasharray=\"1000\" style=\"stroke-dashoffset:var(--doff, 1000); transition:stroke-dashoffset 0.95s cubic-bezier(0.22,0.61,0.36,1), stroke 0.55s\"><\u002Fpath>\n                        <g style=\"transform:rotate(var(--tiprot, -135deg)); transform-origin:140px 140px; transition:transform 0.95s cubic-bezier(0.22,0.61,0.36,1)\">\n                          <circle cx=\"140\" cy=\"36\" r=\"11\" fill=\"var(--fill, #34C759)\" style=\"opacity:0.55; filter:url(#afg-tip)\"><\u002Fcircle>\n                          <circle cx=\"140\" cy=\"36\" r=\"7.5\" fill=\"#ffffff\"><\u002Fcircle>\n                          <circle cx=\"140\" cy=\"36\" r=\"4\" fill=\"var(--fill, #34C759)\"><\u002Fcircle>\n                        <\u002Fg>\n                      <\u002Fsvg>\n                      <div style=\"position:absolute; left:0; right:0; top:52.5%; transform:translateY(-50%); display:flex; align-items:center; justify-content:center; text-align:center; pointer-events:none\">\n                        <div style=\"position:relative; display:inline-block\">\n                          <div style=\"font-family:'Nunito',-apple-system,sans-serif; font-weight:900; font-size:128px; line-height:0.82; letter-spacing:-4px; color:var(--num, #1A9E42); font-variant-numeric:tabular-nums\">{{ gaugeValueD }}<\u002Fdiv>\n                          <div style=\"position:absolute; left:0; right:0; top:100%; margin-top:2px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-weight:700; font-size:17px; letter-spacing:0.3px; color:var(--num, #1A9E42); opacity:0.8\">months<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#1A9E42; margin-bottom:14px\">Your Afloat<\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:44px; font-weight:800; letter-spacing:-1.2px; line-height:1.02; margin:0 0 16px; color:var(--ink,#1C1C1E)\">One number that means everything.<\u002Fh2>\n                <p style=\"font-size:17px; line-height:1.58; color:var(--muted,rgba(60,60,67,0.62)); margin:0 0 26px; max-width:520px\">Your Afloat is how many months you could keep paying yourself if the work stopped. It's the first thing you see, green when you're covered, and it climbs as your buffer grows.<\u002Fp>\n                <div style=\"display:flex; gap:10px; flex-wrap:wrap\">\n                  <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); background:var(--card,rgba(255,255,255,0.7)); border:1px solid var(--line,rgba(60,60,80,0.1)); padding:9px 15px; border-radius:999px; backdrop-filter:blur(10px)\"><span style=\"width:9px;height:9px;border-radius:50%;background:#FF3B30\"><\u002Fspan>Running low<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); background:var(--card,rgba(255,255,255,0.7)); border:1px solid var(--line,rgba(60,60,80,0.1)); padding:9px 15px; border-radius:999px; backdrop-filter:blur(10px)\"><span style=\"width:9px;height:9px;border-radius:50%;background:#FF9500\"><\u002Fspan>Building<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); background:var(--card,rgba(255,255,255,0.7)); border:1px solid var(--line,rgba(60,60,80,0.1)); padding:9px 15px; border-radius:999px; backdrop-filter:blur(10px)\"><span style=\"width:9px;height:9px;border-radius:50%;background:#34C759\"><\u002Fspan>Healthy<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); background:var(--card,rgba(255,255,255,0.7)); border:1px solid var(--line,rgba(60,60,80,0.1)); padding:9px 15px; border-radius:999px; backdrop-filter:blur(10px)\"><span style=\"width:9px;height:9px;border-radius:50%;background:#007AFF\"><\u002Fspan>Ramping up<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- AUTO-SPLIT (1b structure, soft glass) -->\n          <section id=\"2a-how\" style=\"background:transparent\">\n            <div style=\"max-width:1280px; margin:0 auto; padding:72px 56px\">\n              <div style=\"max-width:680px; margin-bottom:36px\">\n                <div style=\"font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#1A9E42; margin-bottom:14px\">The auto-split<\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:46px; font-weight:800; letter-spacing:-1.2px; line-height:1.02; margin:0 0 16px; color:var(--ink,#1C1C1E)\">Every dollar knows its job.<\u002Fh2>\n                <p style=\"font-size:18px; line-height:1.55; color:var(--muted,rgba(60,60,67,0.62)); margin:0\">When an $8,000 invoice lands, Afloat splits it before a cent can wander off. You set the percentages once and forget them. It's the Profit First method, automated.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(24px) saturate(150%); -webkit-backdrop-filter:blur(24px) saturate(150%); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:34px; padding:36px; box-shadow:0 24px 60px var(--shadow,rgba(60,70,100,0.13))\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:22px\">\n                  <span style=\"font-size:14.5px; font-weight:600; color:var(--muted,rgba(60,60,67,0.62))\">Invoice deposit<\u002Fspan>\n                  <span style=\"font-family:'Nunito',sans-serif; font-size:28px; font-weight:800; color:var(--ink,#1C1C1E); letter-spacing:-0.4px\">{{ splitAmount }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:5px; height:56px; border-radius:14px; overflow:hidden; margin-bottom:20px\">\n                  <div style=\"width:{{ taxW }}; background:#FF9500; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; overflow:hidden; white-space:nowrap; transition:width 0.12s linear\">{{ taxPctStr }}<\u002Fdiv>\n                  <div style=\"width:{{ savW }}; background:#5E5CE6; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:13px; overflow:hidden; white-space:nowrap; transition:width 0.12s linear\">{{ savPctStr }}<\u002Fdiv>\n                  <div style=\"width:{{ bufW }}; background:#34C759; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; overflow:hidden; white-space:nowrap; transition:width 0.12s linear\">{{ bufPctStr }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px\">\n                  <div><div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#FF9500\"><\u002Fspan><span style=\"font-size:13px; font-weight:700; color:var(--muted,rgba(60,60,67,0.62))\">Tax reserve<\u002Fspan><\u002Fdiv><div style=\"font-family:'Nunito',sans-serif; font-size:24px; font-weight:800; color:var(--ink,#1C1C1E)\">{{ taxAmt }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#5E5CE6\"><\u002Fspan><span style=\"font-size:13px; font-weight:700; color:var(--muted,rgba(60,60,67,0.62))\">Savings<\u002Fspan><\u002Fdiv><div style=\"font-family:'Nunito',sans-serif; font-size:24px; font-weight:800; color:var(--ink,#1C1C1E)\">{{ savAmt }}<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"display:flex; align-items:center; gap:8px; margin-bottom:4px\"><span style=\"width:10px;height:10px;border-radius:3px;background:#34C759\"><\u002Fspan><span style=\"font-size:13px; font-weight:700; color:var(--muted,rgba(60,60,67,0.62))\">Spendable buffer<\u002Fspan><\u002Fdiv><div style=\"font-family:'Nunito',sans-serif; font-size:24px; font-weight:800; color:var(--ink,#1C1C1E)\">{{ bufAmt }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:20px; padding-top:18px; border-top:1px solid var(--line,rgba(60,60,80,0.1)); font-size:13.5px; color:var(--faint,rgba(60,60,67,0.42))\">Reimbursements skip the tax. Turn savings off any time. It's your split.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- ALTERNATING FEATURES (1b structure, 1a soft cards) -->\n          <section id=\"2a-features\" style=\"max-width:1280px; margin:0 auto; padding:80px 56px; display:flex; flex-direction:column; gap:64px\">\n\n            <!-- pay -->\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center\">\n              <div>\n                <div style=\"font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#1A9E42; margin-bottom:14px\">Pay yourself<\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:38px; font-weight:800; letter-spacing:-1px; line-height:1.04; margin:0 0 16px; color:var(--ink,#1C1C1E)\">A paycheck that doesn't flinch.<\u002Fh2>\n                <p style=\"font-size:16.5px; line-height:1.6; color:var(--muted,rgba(60,60,67,0.62)); margin:0; max-width:460px\">Pick monthly, bi-weekly, or weekly. Afloat counts down to payday and draws your pay from the buffer, so your take-home stays flat through the quiet months. Thin buffer? Plan a smaller draw in a tap.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"position:relative\">\n                <div aria-hidden=\"true\" style=\"position:absolute; top:-22%; right:-16%; width:94%; height:94%; border-radius:50%; background:radial-gradient(circle at 74% 24%, rgba(52,199,89,0.15), transparent 70%); filter:blur(72px); pointer-events:none; z-index:0\"><\u002Fdiv>\n                <div style=\"position:relative; z-index:1; background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(24px) saturate(150%); -webkit-backdrop-filter:blur(24px) saturate(150%); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:32px; padding:30px; box-shadow:0 34px 74px var(--shadow,rgba(60,70,100,0.14))\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:18px\"><span style=\"display:inline-flex; align-items:center; gap:11px\"><span style=\"display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:10px; background:rgba(52,199,89,0.14)\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#1A9E42\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg><\u002Fspan><span style=\"font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--faint,rgba(60,60,67,0.42))\">Pay<\u002Fspan><\u002Fspan><span style=\"display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:#1A9E42; background:rgba(52,199,89,0.14); padding:5px 11px; border-radius:999px\"><svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#1A9E42\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"18\" height=\"18\" x=\"3\" y=\"4\" rx=\"2\"><\u002Frect><path d=\"M3 10h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg>today<\u002Fspan><\u002Fdiv>\n                <div style=\"font-family:'Nunito',sans-serif; font-size:44px; font-weight:800; letter-spacing:-1px; color:var(--ink,#1C1C1E); margin-bottom:4px\">$6,000<\u002Fdiv>\n                <div style=\"font-size:14px; color:var(--muted,rgba(60,60,67,0.62)); margin-bottom:20px\">drawn from your buffer on the 1st<\u002Fdiv>\n                <div style=\"display:flex; gap:8px; margin-bottom:18px\">\n                  <span style=\"flex:1; text-align:center; font-size:13px; font-weight:700; color:#fff; background:#34C759; padding:9px; border-radius:11px\">Monthly<\u002Fspan>\n                  <span style=\"flex:1; text-align:center; font-size:13px; font-weight:600; color:var(--muted,rgba(60,60,67,0.62)); background:var(--cardSolid,#fff); border:1px solid var(--line,rgba(60,60,80,0.1)); padding:9px; border-radius:11px\">Bi-weekly<\u002Fspan>\n                  <span style=\"flex:1; text-align:center; font-size:13px; font-weight:600; color:var(--muted,rgba(60,60,67,0.62)); background:var(--cardSolid,#fff); border:1px solid var(--line,rgba(60,60,80,0.1)); padding:9px; border-radius:11px\">Weekly<\u002Fspan>\n                <\u002Fdiv>\n                <button style=\"width:100%; background:#34C759; color:#fff; border:none; border-radius:13px; padding:14px; font-weight:800; font-size:15px; font-family:inherit; cursor:pointer; box-shadow:0 8px 20px rgba(52,199,89,0.28)\" style-hover=\"filter:brightness(1.06)\">Pay yourself early<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- tax -->\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center\">\n              <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(24px) saturate(150%); -webkit-backdrop-filter:blur(24px) saturate(150%); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:32px; padding:30px; box-shadow:0 34px 74px var(--shadow,rgba(60,70,100,0.14)); order:1; position:relative\" data-glow=\"1\" style-before=\"content:''; position:absolute; width:560px; height:480px; left:-140px; bottom:-150px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(255,149,0,0.16), rgba(255,149,0,0) 70%); filter:blur(64px); z-index:-1; pointer-events:none; animation:afBreathe 7.5s ease-in-out infinite\">\n                <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:18px\"><div style=\"width:40px; height:40px; border-radius:12px; background:rgba(255,149,0,0.16); display:flex; align-items:center; justify-content:center\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#C77400\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div><div style=\"font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--faint,rgba(60,60,67,0.42))\">Tax reserve<\u002Fdiv><div style=\"font-size:13px; color:#C77400; font-weight:600\">Quarterly<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-family:'Nunito',sans-serif; font-size:44px; font-weight:800; letter-spacing:-1px; color:var(--ink,#1C1C1E); margin-bottom:16px\">{{ taxReserveAmt }}<\u002Fdiv>\n                <div style=\"height:10px; border-radius:6px; background:var(--cardSolid,#fff); border:1px solid var(--line,rgba(60,60,80,0.08)); overflow:hidden; margin-bottom:8px\"><div style=\"width:{{ taxBarW }}; height:100%; border-radius:6px; background:linear-gradient(90deg,#FFBE5C,#FF9500); transition:width 0.1s linear\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:13.5px; color:var(--muted,rgba(60,60,67,0.62))\">Set aside from 14 deposits this period. Ready before the bill is.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"order:2\">\n                <div style=\"font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#C77400; margin-bottom:14px\">Tax, handled<\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:38px; font-weight:800; letter-spacing:-1px; line-height:1.04; margin:0 0 16px; color:var(--ink,#1C1C1E)\">Tax money you'll never scramble for.<\u002Fh2>\n                <p style=\"font-size:16.5px; line-height:1.6; color:var(--muted,rgba(60,60,67,0.62)); margin:0; max-width:460px\">A slice of every invoice goes to a reserve that resets each filing period, monthly, quarterly, half-yearly, or yearly. When the bill arrives, the money is already there. No January dread.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- savings -->\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center\">\n              <div>\n                <div style=\"font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#5E5CE6; margin-bottom:14px\">Savings<\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:38px; font-weight:800; letter-spacing:-1px; line-height:1.04; margin:0 0 16px; color:var(--ink,#1C1C1E)\">Savings that happen without you.<\u002Fh2>\n                <p style=\"font-size:16.5px; line-height:1.6; color:var(--muted,rgba(60,60,67,0.62)); margin:0; max-width:460px\">Skim an optional slice off every deposit into a pot kept apart from your spendable money. You never see it leave, and it never counts toward your Afloat. One day you look up and it's real.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(24px) saturate(150%); -webkit-backdrop-filter:blur(24px) saturate(150%); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:32px; padding:30px; box-shadow:0 34px 74px var(--shadow,rgba(60,70,100,0.14)); position:relative\" data-glow=\"1\" style-before=\"content:''; position:absolute; width:560px; height:480px; right:-140px; bottom:-150px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(94,92,230,0.15), rgba(94,92,230,0) 70%); filter:blur(64px); z-index:-1; pointer-events:none; animation:afBreathe 9s ease-in-out infinite 1.2s\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:6px\"><div style=\"display:flex; align-items:center; gap:12px\"><div style=\"width:40px; height:40px; border-radius:12px; background:rgba(94,92,230,0.14); display:flex; align-items:center; justify-content:center\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#5E5CE6\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"3\" x2=\"21\" y1=\"22\" y2=\"22\"><\u002Fline><line x1=\"6\" x2=\"6\" y1=\"18\" y2=\"11\"><\u002Fline><line x1=\"10\" x2=\"10\" y1=\"18\" y2=\"11\"><\u002Fline><line x1=\"14\" x2=\"14\" y1=\"18\" y2=\"11\"><\u002Fline><line x1=\"18\" x2=\"18\" y1=\"18\" y2=\"11\"><\u002Fline><polygon points=\"12 2 20 7 4 7\"><\u002Fpolygon><\u002Fsvg><\u002Fdiv><span style=\"font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--faint,rgba(60,60,67,0.42))\">Saved this year<\u002Fspan><\u002Fdiv><span style=\"font-size:12.5px; font-weight:700; color:#5E5CE6; background:rgba(94,92,230,0.14); padding:5px 11px; border-radius:999px\">10% of every deposit<\u002Fspan><\u002Fdiv>\n                <div style=\"font-family:'Nunito',sans-serif; font-size:44px; font-weight:800; letter-spacing:-1px; color:var(--ink,#1C1C1E); margin-bottom:12px\">{{ savedAmt }}<\u002Fdiv>\n                <svg sc-camel-view-box=\"0 0 400 110\" style=\"width:100%; height:88px; display:block\" sc-camel-preserve-aspect-ratio=\"none\">\n                  <defs><linearGradient id=\"af-2a-spark\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#5E5CE6\" stop-opacity=\"0.32\"><\u002Fstop><stop offset=\"1\" stop-color=\"#5E5CE6\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n                  <path d=\"M0 92 L44 84 L89 86 L133 68 L178 58 L222 60 L267 40 L311 34 L356 20 L400 12 L400 110 L0 110 Z\" fill=\"url(#af-2a-spark)\" style=\"opacity:{{ sparkOpacity }}; transition:opacity 0.1s linear\"><\u002Fpath>\n                  <path d=\"M0 92 L44 84 L89 86 L133 68 L178 58 L222 60 L267 40 L311 34 L356 20 L400 12\" sc-camel-path-length=\"1\" stroke-dasharray=\"1\" fill=\"none\" stroke=\"#5E5CE6\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"stroke-dashoffset:{{ sparkOffset }}; transition:stroke-dashoffset 0.1s linear\"><\u002Fpath>\n                <\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- CALM ON THE SURFACE (phone + bands) -->\n          <section style=\"max-width:1280px; margin:0 auto; padding:20px 56px 60px\">\n            <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(30px) saturate(150%); -webkit-backdrop-filter:blur(30px) saturate(150%); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:40px; box-shadow:0 24px 64px var(--shadow,rgba(60,70,100,0.13)); padding:52px; display:grid; grid-template-columns:0.9fr 1.1fr; gap:52px; align-items:center\">\n              <div style=\"display:flex; justify-content:center\">\n                <div style=\"position:relative; width:280px; height:580px; border-radius:46px; background:#0b0b0d; padding:11px; box-shadow:0 30px 70px rgba(20,24,45,0.4)\">\n                  <div style=\"position:absolute; top:24px; left:50%; transform:translateX(-50%); width:100px; height:30px; background:#0b0b0d; border-radius:16px; z-index:3\"><\u002Fdiv>\n                  <div style=\"width:100%; height:100%; border-radius:36px; overflow:hidden; position:relative; background:#0f1115\">\n                    <image-slot id=\"af-2a-glance\" shape=\"rect\" placeholder=\"Drop your Afloat dashboard screenshot\"><\u002Fimage-slot>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#1A9E42; margin-bottom:14px\">Calm on the surface<\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:36px; font-weight:800; letter-spacing:-0.8px; line-height:1.04; margin:0 0 16px; color:var(--ink,#1C1C1E)\">A glance for reassurance. Precision one tap away.<\u002Fh2>\n                <p style=\"font-size:16px; line-height:1.6; color:var(--muted,rgba(60,60,67,0.62)); margin:0 0 28px; max-width:480px\">The home screen is one honest number, colored by how you're doing. Tap into any of it, Buffer, Pay, Tax, Savings, and the exact figures are right there, drawn from your own ledger.<\u002Fp>\n                <div style=\"display:flex; flex-direction:column; gap:12px\">\n                  <div style=\"display:flex; align-items:center; gap:12px\"><span style=\"width:11px;height:11px;border-radius:50%;background:#FF3B30;flex-shrink:0\"><\u002Fspan><span style=\"font-size:14.5px; color:var(--ink,#1C1C1E)\"><strong style=\"font-weight:700\">Running low<\u002Fstrong> <span style=\"color:var(--muted,rgba(60,60,67,0.62))\">· under a month of pay in the buffer<\u002Fspan><\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px\"><span style=\"width:11px;height:11px;border-radius:50%;background:#FF9500;flex-shrink:0\"><\u002Fspan><span style=\"font-size:14.5px; color:var(--ink,#1C1C1E)\"><strong style=\"font-weight:700\">Building<\u002Fstrong> <span style=\"color:var(--muted,rgba(60,60,67,0.62))\">· one to three months, and climbing<\u002Fspan><\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px\"><span style=\"width:11px;height:11px;border-radius:50%;background:#34C759;flex-shrink:0\"><\u002Fspan><span style=\"font-size:14.5px; color:var(--ink,#1C1C1E)\"><strong style=\"font-weight:700\">Healthy<\u002Fstrong> <span style=\"color:var(--muted,rgba(60,60,67,0.62))\">· three months or more, comfortable<\u002Fspan><\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px\"><span style=\"width:11px;height:11px;border-radius:50%;background:#007AFF;flex-shrink:0\"><\u002Fspan><span style=\"font-size:14.5px; color:var(--ink,#1C1C1E)\"><strong style=\"font-weight:700\">Ramping up<\u002Fstrong> <span style=\"color:var(--muted,rgba(60,60,67,0.62))\">· just starting, building your first buffer<\u002Fspan><\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- PRIVACY -->\n          <section id=\"2a-privacy\" style=\"max-width:1280px; margin:0 auto; padding:80px 56px\">\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center\">\n              <div>\n                <div style=\"font-size:12.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#007AFF; margin-bottom:14px\">Private by default<\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:40px; font-weight:800; letter-spacing:-1.1px; margin:0 0 16px; color:var(--ink,#1C1C1E)\">Your money is nobody's business.<\u002Fh2>\n                <p style=\"font-size:16px; line-height:1.6; color:var(--muted,rgba(60,60,67,0.62)); margin:0; max-width:460px\">Afloat has no accounts and no server. Your numbers live on your device as a small file you own, and you can back it up or sync it through your own iCloud. That is the whole architecture.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px\">\n                <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(18px); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:18px; padding:20px\"><div style=\"margin-bottom:13px; line-height:0\"><svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16171A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><line x1=\"17\" x2=\"22\" y1=\"8\" y2=\"13\"><\u002Fline><line x1=\"22\" x2=\"17\" y1=\"8\" y2=\"13\"><\u002Fline><\u002Fsvg><\u002Fdiv><div style=\"font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); margin-bottom:5px\">No accounts<\u002Fdiv><div style=\"font-size:13px; line-height:1.5; color:var(--muted,rgba(60,60,67,0.62))\">Nothing to create, nothing to sign in to.<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(18px); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:18px; padding:20px\"><div style=\"margin-bottom:13px; line-height:0\"><svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16171A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"14\" height=\"20\" x=\"5\" y=\"2\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M12 18h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); margin-bottom:5px\">On-device storage<\u002Fdiv><div style=\"font-size:13px; line-height:1.5; color:var(--muted,rgba(60,60,67,0.62))\">All your data stays on your iPhone.<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(18px); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:18px; padding:20px\"><div style=\"margin-bottom:13px; line-height:0\"><svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16171A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.88 9.88a3 3 0 1 0 4.24 4.24\"><\u002Fpath><path d=\"M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68\"><\u002Fpath><path d=\"M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61\"><\u002Fpath><line x1=\"2\" x2=\"22\" y1=\"2\" y2=\"22\"><\u002Fline><\u002Fsvg><\u002Fdiv><div style=\"font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); margin-bottom:5px\">Data not collected<\u002Fdiv><div style=\"font-size:13px; line-height:1.5; color:var(--muted,rgba(60,60,67,0.62))\">No analytics, no ads, no tracking.<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(18px); border:1px solid var(--border,rgba(255,255,255,0.75)); border-radius:18px; padding:20px\"><div style=\"margin-bottom:13px; line-height:0\"><svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16171A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7V5a2 2 0 0 1 2-2h2\"><\u002Fpath><path d=\"M17 3h2a2 2 0 0 1 2 2v2\"><\u002Fpath><path d=\"M21 17v2a2 2 0 0 1-2 2h-2\"><\u002Fpath><path d=\"M7 21H5a2 2 0 0 1-2-2v-2\"><\u002Fpath><path d=\"M8 14s1.5 2 4 2 4-2 4-2\"><\u002Fpath><path d=\"M9 9h.01\"><\u002Fpath><path d=\"M15 9h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-size:14px; font-weight:700; color:var(--ink,#1C1C1E); margin-bottom:5px\">Face ID lock<\u002Fdiv><div style=\"font-size:13px; line-height:1.5; color:var(--muted,rgba(60,60,67,0.62))\">Keep it for your eyes only.<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- FAQ -->\n          <section id=\"2a-faq\" style=\"max-width:1200px; margin:0 auto; padding:40px 56px 60px\">\n            <h2 style=\"font-family:'Nunito',sans-serif; font-size:40px; font-weight:800; letter-spacing:-1.1px; margin:0 0 34px; text-align:center; color:var(--ink,#1C1C1E)\">Questions, answered<\u002Fh2>\n            <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px; align-items:start\">\n              <sc-for list=\"{{ faqD }}\" as=\"item\" hint-placeholder-count=\"5\">\n                <div style=\"background:var(--card,rgba(255,255,255,0.7)); backdrop-filter:blur(18px); border:1px solid var(--line,rgba(60,60,80,0.1)); border-radius:16px; overflow:hidden\">\n                  <button sc-camel-on-click=\"{{ item.toggle }}\" style=\"width:100%; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:20px 22px; background:transparent; border:none; cursor:pointer; text-align:left; font-family:inherit\">\n                    <span style=\"font-size:16.5px; font-weight:700; color:var(--ink,#1C1C1E)\">{{ item.q }}<\u002Fspan>\n                    <span style=\"flex-shrink:0; font-size:22px; font-weight:400; color:#1A9E42; line-height:1\">{{ item.sign }}<\u002Fspan>\n                  <\u002Fbutton>\n                  <sc-if value=\"{{ item.open }}\"><div style=\"padding:0 22px 22px; font-size:15px; line-height:1.6; color:var(--muted,rgba(60,60,67,0.62)); max-width:640px\">{{ item.a }}<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- FINAL CTA (premium dark aurora) -->\n          <section style=\"max-width:1280px; margin:0 auto; padding:40px 56px 96px\">\n            <div style=\"position:relative; overflow:hidden; border-radius:44px; background:linear-gradient(150deg, #E6F6EB 0%, #E8F0FB 54%, #EAEFFE 100%); padding:78px 64px; text-align:center; border:1px solid rgba(255,255,255,0.7); box-shadow:0 30px 72px -30px rgba(20,45,60,0.26)\">\n              <div aria-hidden=\"true\" style=\"position:absolute; inset:0; overflow:hidden; pointer-events:none\">\n                <div data-blob=\"1\" style=\"position:absolute; top:-32%; left:-6%; width:540px; height:540px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(52,199,89,0.3), rgba(52,199,89,0) 68%); filter:blur(72px); animation:afDriftA 24s ease-in-out infinite\"><\u002Fdiv>\n                <div data-blob=\"2\" style=\"position:absolute; top:-36%; right:-8%; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(10,132,255,0.24), rgba(10,132,255,0) 68%); filter:blur(78px); animation:afDriftB 28s ease-in-out infinite\"><\u002Fdiv>\n                <div data-blob=\"3\" style=\"position:absolute; bottom:-42%; left:38%; width:540px; height:540px; border-radius:50%; background:radial-gradient(circle at 50% 50%, rgba(94,92,230,0.18), rgba(94,92,230,0) 70%); filter:blur(84px); animation:afDriftC 26s ease-in-out infinite\"><\u002Fdiv>\n                <div style=\"position:absolute; inset:0; background-image:linear-gradient(rgba(20,50,40,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(20,50,40,0.05) 1px,transparent 1px); background-size:52px 52px; mask-image:radial-gradient(120% 100% at 50% 0%, #000 18%, transparent 72%); -webkit-mask-image:radial-gradient(120% 100% at 50% 0%, #000 18%, transparent 72%)\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"position:relative; z-index:1; display:grid; grid-template-columns:minmax(0,1.05fr) minmax(0,0.95fr); gap:52px; align-items:center; text-align:left\">\n                <div>\n                <div style=\"display:flex; align-items:center; gap:15px; margin-bottom:20px\">\n                <div aria-hidden=\"true\" style=\"position:relative; width:78px; height:78px; flex:none; border-radius:18px; background:linear-gradient(180deg,#ffffff,#eef1f5); box-shadow:0 12px 26px -6px rgba(20,45,60,0.36), inset 0 1px 0 rgba(255,255,255,0.92), inset 0 -8px 18px rgba(120,140,170,0.10); overflow:hidden\">\n                  <div style=\"position:absolute; inset:0; background:linear-gradient(150deg,#88AF8A,#3161A5); -webkit-mask:var(--afmark) center/62% no-repeat; mask:var(--afmark) center/62% no-repeat\"><\u002Fdiv>\n                  <div style=\"position:absolute; inset:0; background:linear-gradient(148deg, rgba(255,255,255,0.72) 0%, rgba(255,255,255,0) 46%); pointer-events:none\"><\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-family:'Hanken Grotesk',Manrope,-apple-system,sans-serif; font-size:34px; font-weight:800; letter-spacing:-0.8px; color:#152A1E\">Afloat<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:inline-flex; align-items:center; gap:8px; padding:7px 15px; border-radius:999px; background:rgba(255,255,255,0.62); border:1px solid rgba(26,158,66,0.28); backdrop-filter:blur(10px); margin-bottom:22px\">\n                  <span style=\"width:7px; height:7px; border-radius:50%; background:#34C759; box-shadow:0 0 0 4px rgba(52,199,89,0.22)\"><\u002Fspan>\n                  <span style=\"font-size:12px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; color:rgba(22,40,30,0.68)\">Coming soon to iPhone<\u002Fspan>\n                <\u002Fdiv>\n                <h2 style=\"font-family:'Nunito',sans-serif; font-size:54px; font-weight:900; letter-spacing:-1.8px; line-height:1.0; margin:0 0 16px; color:#152A1E\">Give your income a <span style=\"background:linear-gradient(102deg,#34C759,#0A84FF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent\">rhythm.<\u002Fspan><\u002Fh2>\n                <p style=\"font-size:18px; line-height:1.55; color:rgba(24,40,32,0.66); margin:0; max-width:480px\">Afloat is coming soon to iPhone. Join the waitlist and you'll be first through the door, with early access before launch.<\u002Fp><\u002Fdiv><div>\n                <sc-if value=\"{{ fd.pending }}\" hint-placeholder-val=\"{{ true }}\">\n                  <form sc-camel-on-submit=\"{{ submitD }}\" style=\"display:flex; flex-direction:column; gap:12px; margin:0 0 18px\">\n                    <input value=\"{{ fd.name }}\" sc-camel-on-change=\"{{ onNameD }}\" type=\"text\" placeholder=\"First name\" style=\"width:100%; background:rgba(255,255,255,0.72); border:1px solid rgba(20,45,35,0.16); border-radius:14px; padding:16px 18px; font-size:16px; color:#16211B; outline:none; font-family:inherit\" style-focus=\"border-color:#34C759; box-shadow:0 0 0 4px rgba(52,199,89,0.16)\">\n                    <input value=\"{{ fd.email }}\" sc-camel-on-change=\"{{ onEmailD }}\" type=\"email\" placeholder=\"you@email.com\" style=\"width:100%; background:rgba(255,255,255,0.72); border:1px solid rgba(20,45,35,0.16); border-radius:14px; padding:16px 18px; font-size:16px; color:#16211B; outline:none; font-family:inherit\" style-focus=\"border-color:#34C759; box-shadow:0 0 0 4px rgba(52,199,89,0.16)\">\n                    <button type=\"submit\" style=\"background:linear-gradient(135deg,#34C759,#0A84FF); color:#fff; border:none; border-radius:14px; padding:17px; font-weight:800; font-size:16px; cursor:pointer; font-family:inherit; width:100%; box-shadow:0 14px 32px rgba(10,132,255,0.4)\" style-hover=\"filter:brightness(1.08)\" style-active=\"transform:scale(0.985)\">Get early access<\u002Fbutton>\n                  <\u002Fform>\n                  <div style=\"display:flex; align-items:center; justify-content:flex-start; gap:18px; flex-wrap:wrap\">\n                    <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:rgba(24,40,32,0.64)\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#34C759\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>No spam<\u002Fspan>\n                    <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:rgba(24,40,32,0.64)\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#34C759\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>No accounts<\u002Fspan>\n                    <span style=\"display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:rgba(24,40,32,0.64)\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#34C759\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Early access at launch<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ fd.done }}\">\n                  <div style=\"display:inline-flex; align-items:center; gap:12px; background:rgba(255,255,255,0.72); border:1px solid rgba(20,45,35,0.14); border-radius:16px; padding:18px 26px; backdrop-filter:blur(10px)\"><div style=\"width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#34C759,#0A84FF); display:flex; align-items:center; justify-content:center; flex-shrink:0\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span style=\"font-size:16.5px; font-weight:700; color:#16211B\">{{ fd.doneMsg }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- FOOTER -->\n          <footer style=\"border-top:1px solid var(--line,rgba(60,60,80,0.1))\">\n            <div style=\"max-width:1280px; margin:0 auto; padding:44px 56px; display:flex; align-items:flex-start; justify-content:space-between; gap:40px; flex-wrap:wrap\">\n              <div style=\"max-width:300px\">\n                <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px\"><span aria-hidden=\"true\" style=\"display:block; width:23px; height:23px; background:#1A9E42; -webkit-mask:var(--afmark) center/contain no-repeat; mask:var(--afmark) center/contain no-repeat\"><\u002Fspan><span style=\"font-size:18px; font-weight:800; letter-spacing:-0.3px; color:var(--ink,#1C1C1E)\">Afloat<\u002Fspan><\u002Fdiv>\n                <p style=\"font-size:13.5px; line-height:1.55; color:var(--muted,rgba(60,60,67,0.62)); margin:0\">A financial planning tool for freelancers, contractors, and creators. Anyone whose paycheck isn't steady.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:56px; flex-wrap:wrap\">\n                <div style=\"display:flex; flex-direction:column; gap:10px\"><span style=\"font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--faint,rgba(60,60,67,0.42))\">Product<\u002Fspan><a href=\"#2a-how\" style=\"font-size:14px; color:var(--muted,rgba(60,60,67,0.62))\">How it works<\u002Fa><a href=\"#2a-features\" style=\"font-size:14px; color:var(--muted,rgba(60,60,67,0.62))\">Features<\u002Fa><a href=\"#2a-privacy\" style=\"font-size:14px; color:var(--muted,rgba(60,60,67,0.62))\">Privacy<\u002Fa><\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:10px\"><span style=\"font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--faint,rgba(60,60,67,0.42))\">Company<\u002Fspan><a href=\"#2a-faq\" style=\"font-size:14px; color:var(--muted,rgba(60,60,67,0.62))\">FAQ<\u002Fa><a href=\"#2a-join\" style=\"font-size:14px; color:var(--muted,rgba(60,60,67,0.62))\">Waitlist<\u002Fa><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"max-width:1280px; margin:0 auto; padding:0 56px 40px\"><div style=\"border-top:1px solid var(--line,rgba(60,60,80,0.1)); padding-top:20px; font-size:12.5px; color:var(--faint,rgba(60,60,67,0.42))\">© 2026 Afloat · Your data stays yours.<\u002Fdiv><\u002Fdiv>\n          <\u002Ffooter>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{}\">\nclass Component extends DCLogic {\n  state = {\n    theme: { a: 'light', b: 'dark', c: 'light', d: 'light' },\n    form: {\n      a: { name: '', email: '', done: false, err: '' },\n      b: { name: '', email: '', done: false, err: '' },\n      c: { name: '', email: '', done: false, err: '' },\n      d: { name: '', email: '', done: false, err: '' }\n    },\n    faq: { a: -1, b: -1, c: -1, d: -1 },\n    split: { amount: 8000, tax: 30, savings: 10 },\n    pay: { days: 6 },\n    tax: { g: 0 },\n    sav: { g: 0 },\n    gauge: { i: 0 }\n  };\n\n  componentDidMount() {\n    try {\n      ['a', 'b', 'c', 'd'].forEach(k => {\n        const raw = localStorage.getItem('afloat_wl_' + k);\n        if (raw) {\n          const d = JSON.parse(raw);\n          this.setState(s => ({ form: { ...s.form, [k]: { ...s.form[k], name: d.name || '', email: d.email || '', done: true } } }));\n        }\n      });\n    } catch (e) {}\n    this._setupReveal();\n    this._startSplitAnim();\n    this._startFeatureAnims();\n    this._startGaugeCycle();\n    this._setupParallax();\n  }\n\n  _setupParallax() {\n    let reduce = false;\n    try { reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}\n    if (reduce) return;\n    const grid = document.getElementById('af-grid');\n    if (!grid) return;\n    let ticking = false;\n    this._onScroll = () => {\n      if (ticking) return;\n      ticking = true;\n      requestAnimationFrame(() => {\n        const y = window.scrollY || window.pageYOffset || 0;\n        grid.style.backgroundPositionY = (y * 0.38).toFixed(1) + 'px';\n        ticking = false;\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  _startGaugeCycle() {\n    let reduce = false;\n    try { reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}\n    if (reduce) return;\n    if (this._gaugeTimer) clearInterval(this._gaugeTimer);\n    this._gaugeTimer = setInterval(() => {\n      this.setState(s => ({ gauge: { i: ((s.gauge && s.gauge.i) || 0) + 1 } }));\n    }, 2900);\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._splitTimer);\n    if (this._splitRaf) cancelAnimationFrame(this._splitRaf);\n    if (this._payTimer) clearInterval(this._payTimer);\n    if (this._gaugeTimer) clearInterval(this._gaugeTimer);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n\n  _startSplitAnim() {\n    const S = [\n      { amount: 8000, tax: 30, savings: 10 },\n      { amount: 3200, tax: 25, savings: 15 },\n      { amount: 12500, tax: 35, savings: 8 },\n      { amount: 5400, tax: 30, savings: 5 },\n      { amount: 9800, tax: 28, savings: 12 }\n    ];\n    this.setState({ split: { ...S[0] } });\n    let reduce = false;\n    try { reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}\n    if (reduce) return;\n    let i = 0;\n    const dwell = 2600, dur = 850, ease = (t) => 1 - Math.pow(1 - t, 3);\n    const next = () => {\n      const from = S[i]; i = (i + 1) % S.length; const to = S[i];\n      const t0 = performance.now();\n      const tick = (now) => {\n        const p = Math.min(1, (now - t0) / dur), e = ease(p);\n        this.setState({ split: {\n          amount: from.amount + (to.amount - from.amount) * e,\n          tax: from.tax + (to.tax - from.tax) * e,\n          savings: from.savings + (to.savings - from.savings) * e\n        } });\n        if (p < 1) { this._splitRaf = requestAnimationFrame(tick); }\n        else { this._splitTimer = setTimeout(next, dwell); }\n      };\n      this._splitRaf = requestAnimationFrame(tick);\n    };\n    this._splitTimer = setTimeout(next, dwell);\n  }\n\n  _startFeatureAnims() {\n    let reduce = false;\n    try { reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}\n    if (reduce) { this.setState({ pay: { days: 0 }, tax: { g: 1 }, sav: { g: 1 } }); return; }\n    const target = document.getElementById('2a-features');\n    const begin = () => {\n      this._countUp('tax', 1500, 0);\n      this._countUp('sav', 1600, 220);\n    };\n    if (!target || typeof IntersectionObserver === 'undefined') { begin(); return; }\n    let started = false;\n    const io = new IntersectionObserver((entries, obs) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting && !started) { started = true; begin(); obs.disconnect(); }\n      });\n    }, { threshold: 0.25 });\n    io.observe(target);\n  }\n\n  _countUp(key, dur, delay) {\n    const ease = (t) => 1 - Math.pow(1 - t, 3);\n    const start = () => {\n      const t0 = performance.now();\n      const tick = (now) => {\n        const p = Math.min(1, (now - t0) / dur);\n        this.setState({ [key]: { g: ease(p) } });\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    };\n    if (delay) setTimeout(start, delay); else start();\n  }\n\n  _runPayday() {\n    let d = 6;\n    if (this._payTimer) clearInterval(this._payTimer);\n    this._payTimer = setInterval(() => {\n      d = d > 0 ? d - 1 : 6;\n      this.setState({ pay: { days: d } });\n    }, 950);\n  }\n\n  _setupReveal() {\n    let reduce = false;\n    try { reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}\n    if (reduce || typeof IntersectionObserver === 'undefined') return;\n    const nodes = document.querySelectorAll('header > div, section:not([data-screen-label]) > div, footer > div');\n    if (!nodes.length) return;\n    const vh = window.innerHeight || 800;\n    const io = new IntersectionObserver((entries, obs) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) {\n          const el = entry.target;\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          el.style.willChange = 'auto';\n          obs.unobserve(el);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -8% 0px' });\n    // Anything already in view at load is revealed immediately and NEVER hidden\n    // (prevents a blank hero); only below-the-fold sections animate in on scroll.\n    const below = [];\n    nodes.forEach((el) => {\n      const rect = el.getBoundingClientRect();\n      if (rect.top < vh * 0.9) {\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n        return;\n      }\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(28px)';\n      el.style.transition = 'opacity 0.7s cubic-bezier(.22,.61,.36,1), transform 0.7s cubic-bezier(.22,.61,.36,1)';\n      el.style.willChange = 'opacity, transform';\n      below.push(el);\n    });\n    requestAnimationFrame(() => requestAnimationFrame(() => below.forEach((el) => io.observe(el))));\n  }\n\n  toggleTheme(k) {\n    this.setState(s => ({ theme: { ...s.theme, [k]: s.theme[k] === 'dark' ? 'light' : 'dark' } }));\n  }\n  setField(k, field, val) {\n    this.setState(s => ({ form: { ...s.form, [k]: { ...s.form[k], [field]: val, err: '' } } }));\n  }\n  submit(k) {\n    return (e) => {\n      e.preventDefault();\n      const f = this.state.form[k];\n      const email = (f.email || '').trim();\n      const ok = /^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(email);\n      if (!ok) {\n        this.setState(s => ({ form: { ...s.form, [k]: { ...s.form[k], err: 'Please enter a valid email.' } } }));\n        return;\n      }\n      try { localStorage.setItem('afloat_wl_' + k, JSON.stringify({ name: f.name, email })); } catch (e2) {}\n      this.setState(s => ({ form: { ...s.form, [k]: { ...s.form[k], done: true, err: '' } } }));\n    };\n  }\n  toggleFaq(k, i) {\n    this.setState(s => ({ faq: { ...s.faq, [k]: s.faq[k] === i ? -1 : i } }));\n  }\n\n  tk(mode) {\n    if (mode === 'dark') return {\n      bg: '#0A0B0F', bg2: '#111319', ink: '#F2F3F5', muted: 'rgba(235,235,245,0.62)', faint: 'rgba(235,235,245,0.40)',\n      card: 'rgba(28,31,40,0.55)', cardSolid: '#15171E', line: 'rgba(255,255,255,0.10)', border: 'rgba(255,255,255,0.12)',\n      shadow: 'rgba(0,0,0,0.55)', wallop: '0.55', field: 'rgba(255,255,255,0.06)'\n    };\n    return {\n      bg: '#F3F4F7', bg2: '#EAECF1', ink: '#1C1C1E', muted: 'rgba(60,60,67,0.62)', faint: 'rgba(60,60,67,0.42)',\n      card: 'rgba(255,255,255,0.70)', cardSolid: '#FFFFFF', line: 'rgba(60,60,80,0.10)', border: 'rgba(255,255,255,0.75)',\n      shadow: 'rgba(60,70,100,0.13)', wallop: '0.92', field: '#FFFFFF'\n    };\n  }\n\n  buildForm(k) {\n    const f = this.state.form[k];\n    const first = (f.name || '').trim().split(' ')[0];\n    return {\n      ...f,\n      pending: !f.done,\n      doneMsg: first ? (\"You're on the list, \" + first + \".\") : \"You're on the list.\"\n    };\n  }\n\n  buildFaq(k, data) {\n    return data.map((it, i) => ({\n      q: it.q, a: it.a,\n      open: this.state.faq[k] === i,\n      sign: this.state.faq[k] === i ? '\\u2212' : '+',\n      toggle: () => this.toggleFaq(k, i)\n    }));\n  }\n\n  renderVals() {\n    const t = this.state.theme;\n    const faqCommon = [\n      { q: 'When does Afloat launch?', a: \"We're putting the final touches on version 1.0 for iPhone. Join the waitlist and you'll be the first to know the day it opens.\" },\n      { q: 'How is this different from a budgeting app?', a: \"Afloat is the opposite of a budgeting app. No bank login, no expense categories, no spreadsheet to maintain. Just one forward-looking number, built for income that isn't steady.\" },\n      { q: 'How much will it cost?', a: \"Afloat is a paid app with a 7-day free trial, then $3.99/month, $24.99/year, or $69.99 once for lifetime. Waitlist members get early access and the first heads-up.\" },\n      { q: 'Do you connect to my bank?', a: \"No. You log income yourself, which keeps Afloat completely private and free of bank connections. It's a deliberate choice.\" },\n      { q: 'What if my income is really irregular?', a: \"That's exactly who Afloat is for. Your buffer absorbs the lumps so the amount you pay yourself stays smooth and predictable.\" },\n      { q: 'Is there an Android version?', a: \"Afloat is iPhone-only for now. Join the waitlist anyway and we'll gauge interest for other platforms.\" }\n    ];\n\n    const sp = this.state.split || { amount: 8000, tax: 30, savings: 10 };\n    const _tax = sp.tax, _sav = sp.savings, _buf = 100 - _tax - _sav;\n    const _fmt = (n) => '$' + Math.round(n).toLocaleString('en-US');\n    const _gBands = {\n      red:   { key: 'red',   value: 0.6, dot: '#FF3B30', ring: 'rgba(255,59,48,0.18)',  glow: 'rgba(255,59,48,0.45)',  txtL: '#FF3B30', txtD: '#FF8076', label: 'Running low' },\n      amber: { key: 'amber', value: 2.4, dot: '#F5A623', ring: 'rgba(245,166,35,0.20)',  glow: 'rgba(245,166,35,0.48)', txtL: '#F5A623', txtD: '#FFC24D', label: 'Building' },\n      green: { key: 'green', value: 7.5, dot: '#34C759', ring: 'rgba(52,199,89,0.18)',  glow: 'rgba(52,199,89,0.45)',  txtL: '#22B24E', txtD: '#7BE89C', label: 'Healthy' }\n    };\n    const _gOrder = ['red', 'amber', 'green'];\n    const _gCur = _gBands[_gOrder[((this.state.gauge && this.state.gauge.i) || 0) % 3]];\n    const _gDark = this.state.theme.d === 'dark';\n    const _pd = (this.state.pay && this.state.pay.days != null) ? this.state.pay.days : 6;\n    const _tg = (this.state.tax && this.state.tax.g) || 0;\n    const _sg = (this.state.sav && this.state.sav.g) || 0;\n    const _gFrac = Math.max(0, Math.min(1, _gCur.value / 12));\n    const _gDoff = Math.round(1000 * (1 - _gFrac));\n    const _gTiprot = (-135 + 270 * _gFrac).toFixed(2) + 'deg';\n    return {\n      gaugeValueD: _gCur.value,\n      gaugeFillD: _gCur.dot,\n      gaugeNumColorD: _gDark ? _gCur.txtD : _gCur.txtL,\n      gaugeTrackD: _gDark ? 'rgba(255,255,255,0.12)' : 'rgba(60,60,80,0.10)',\n      gaugeDoffD: String(_gDoff),\n      gaugeTiprotD: _gTiprot,\n      gaugeBandD: _gCur.key,\n      gaugeStatusLabel: _gCur.label,\n      gaugeStatusColor: _gDark ? _gCur.txtD : _gCur.txtL,\n      gaugeStatusDot: _gCur.dot,\n      gaugeStatusRing: _gCur.ring,\n      gaugeGlow: _gCur.glow,\n      paydayText: _pd > 0 ? ('in ' + _pd + (_pd === 1 ? ' day' : ' days')) : 'today',\n      payDots: Array.from({ length: 6 }, (_, i) => ({ bg: i < (6 - _pd) ? '#34C759' : (this.state.theme.d === 'dark' ? 'rgba(255,255,255,0.14)' : 'rgba(60,60,80,0.12)') })),\n      payRingOffset: (100 * (1 - (6 - _pd) / 6)).toFixed(2),\n      taxReserveAmt: _fmt(5472 * _tg),\n      taxBarW: (68 * _tg).toFixed(1) + '%',\n      savedAmt: _fmt(9180 * _sg),\n      sparkOffset: (1 - _sg).toFixed(3),\n      sparkOpacity: _sg.toFixed(3),\n      splitAmount: _fmt(sp.amount),\n      taxW: _tax.toFixed(2) + '%', savW: _sav.toFixed(2) + '%', bufW: _buf.toFixed(2) + '%',\n      taxPctStr: Math.round(_tax) + '%', savPctStr: Math.round(_sav) + '%', bufPctStr: Math.round(_buf) + '%',\n      taxAmt: _fmt(sp.amount * _tax / 100),\n      savAmt: _fmt(sp.amount * _sav / 100),\n      bufAmt: _fmt(sp.amount * _buf / 100),\n      ta: this.tk(t.a), tb: this.tk(t.b), tc: this.tk(t.c), td: this.tk(t.d),\n      aLight: t.a !== 'dark', aDark: t.a === 'dark',\n      bLight: t.b !== 'dark', bDark: t.b === 'dark',\n      cLight: t.c !== 'dark', cDark: t.c === 'dark',\n      dLight: t.d !== 'dark', dDark: t.d === 'dark',\n      gaugeModeA: t.a, gaugeModeB: t.b, gaugeModeC: t.c, gaugeModeD: t.d,\n      toggleA: () => this.toggleTheme('a'),\n      toggleB: () => this.toggleTheme('b'),\n      toggleC: () => this.toggleTheme('c'),\n      toggleD: () => this.toggleTheme('d'),\n      onNameA: (e) => this.setField('a', 'name', e.target.value),\n      onEmailA: (e) => this.setField('a', 'email', e.target.value),\n      onNameB: (e) => this.setField('b', 'name', e.target.value),\n      onEmailB: (e) => this.setField('b', 'email', e.target.value),\n      onNameC: (e) => this.setField('c', 'name', e.target.value),\n      onEmailC: (e) => this.setField('c', 'email', e.target.value),\n      onNameD: (e) => this.setField('d', 'name', e.target.value),\n      onEmailD: (e) => this.setField('d', 'email', e.target.value),\n      submitA: this.submit('a'),\n      submitB: this.submit('b'),\n      submitC: this.submit('c'),\n      submitD: this.submit('d'),\n      fa: this.buildForm('a'), fb: this.buildForm('b'), fc: this.buildForm('c'), fd: this.buildForm('d'),\n      faqA: this.buildFaq('a', faqCommon),\n      faqB: this.buildFaq('b', faqCommon),\n      faqC: this.buildFaq('c', faqCommon),\n      faqD: this.buildFaq('d', faqCommon)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
